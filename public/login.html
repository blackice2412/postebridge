<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — PosteBridge</title>
    <link rel="stylesheet" href="/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
    <style>
      .login-page { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .login-card { width: min(400px, 100%); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); }
      .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
      .login-brand .logo { width: 40px; height: 40px; font-size: 12px; }
      .login-brand h1 { margin: 0; font-size: 1.2rem; }
      .login-brand p { margin: 2px 0 0; color: var(--muted); font-size: 0.82rem; }
    </style>
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="login-brand">
          <div class="logo">PB</div>
          <div><h1>PosteBridge</h1><p>Hetzner DNS × Poste.io</p></div>
        </div>
        <form id="loginForm" class="form-stack">
          <label class="field"><span>Username</span><input id="username" type="text" value="root" autocomplete="username" required /></label>
          <label class="field"><span>Password</span><input id="password" type="password" autocomplete="current-password" required /></label>
          <button class="btn btn-primary btn-block" type="submit">Sign in</button>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/login.js" type="module"></script>
  </body>
</html>
